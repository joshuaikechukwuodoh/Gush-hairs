<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - GUSS HAIRS</title>
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        :root {
            --primary: #141414;
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #141414;
            --muted: #666666;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: var(--muted);
            margin-bottom: 2rem;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid #e5e5e5;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus {
            border-color: var(--primary);
        }
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #response {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #fafafa;
            border-radius: 16px;
            border: 1px solid #eeeeee;
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.6;
            min-height: 100px;
        }
        .logout-btn {
            background: transparent;
            color: var(--muted);
            font-size: 0.8rem;
            padding: 0.5rem;
        }
        .logout-btn:hover {
            color: var(--primary);
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <h1>Admin AI Dashboard</h1>
                <p class="subtitle">Securely prompt the Gemini AI model</p>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <textarea id="promptInput" placeholder="Describe what you want the AI to do..."></textarea>
        
        <div class="actions">
            <span id="status" style="font-size: 0.8rem; color: var(--muted);"></span>
            <button id="sendBtn" onclick="handleSend()">Send to Gemini</button>
        </div>

        <div id="response">Response will appear here...</div>
    </div>

    <script>
        // Redirect if not logged in
        const user = netlifyIdentity.currentUser();
        if (!user) {
            window.location.href = "/";
        }

        async function handleLogout() {
            await netlifyIdentity.logout();
            window.location.href = "/";
        }

        async function handleSend() {
            const prompt = document.getElementById('promptInput').value;
            const responseDiv = document.getElementById('response');
            const sendBtn = document.getElementById('sendBtn');
            const status = document.getElementById('status');

            if (!prompt.trim()) return;

            sendBtn.disabled = true;
            status.innerText = "Processing...";
            responseDiv.innerText = "Thinking...";
            responseDiv.style.opacity = "0.6";

            try {
                // Get fresh token
                const token = await netlifyIdentity.currentUser().jwt();
                
                const res = await fetch('/.netlify/functions/gemini', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ prompt })
                });

                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error || "Failed to fetch response");
                }

                responseDiv.innerText = data.text;
                status.innerText = "Completed";
            } catch (error) {
                console.error(error);
                responseDiv.innerText = "Error: " + error.message;
                status.innerText = "Failed";
            } finally {
                sendBtn.disabled = false;
                responseDiv.style.opacity = "1";
            }
        }

        // Handle identity events
        netlifyIdentity.on('logout', () => window.location.href = "/");
    </script>
</body>
</html>
